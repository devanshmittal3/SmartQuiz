<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartQuiz — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=2" />
  <link rel="shortcut icon" href="assets/favicon.png?v=2" type="image/x-icon" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=2">
  <script src="theme.js"></script>
</head>
<body class="page-wrapper">
<div class="auth-page" style="flex:1;">
  <img src="assets/login_hero.png" class="auth-bg-img" alt="Background decoration" />
  
  <div class="auth-box">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="Logo" class="auth-logo-img" />
      <h1>SmartQuiz</h1>
      <p>Master every subject, one quiz at a time</p>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login"    role="tab" aria-selected="true">Login</button>
      <button class="auth-tab"        id="tab-register" role="tab" aria-selected="false">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn-primary form-submit" id="login-btn">
        <span id="login-btn-text">Sign In</span>
      </button>
    </form>

    <!-- Register Form (hidden) -->
    <form id="register-form" novalidate style="display:none">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <div class="form-error" id="register-error"></div>
      <button type="submit" class="btn-primary form-submit" id="register-btn">
        <span id="register-btn-text">Create Account</span>
      </button>
    </form>
  </div>

  <!-- Admin Portal Link -->
  <div class="auth-admin-link">
    <a href="admin.html">🔐 Admin Portal</a>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>&copy; 2026 <span class="footer__trademark">SmartQuiz&trade;</span>. Made by <a href="https://www.linkedin.com/in/devanshmittal07/" target="_blank" class="footer__creator">Devansh Mittal</a>. All Rights Reserved.</p>
  </div>
</footer>

<script type="module">
  import { login, register } from "./auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { auth } from "./firebase-config.js";

  // If already logged in, skip to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("index.html: User already logged in, redirecting to domains.html", user.email);
      window.location.href = "domains.html";
    } else {
      console.log("index.html: No user logged in");
    }
  });

  // ─── Tab switching ──────────────────────────────────────
  const tabLogin    = document.getElementById("tab-login");
  const tabRegister = document.getElementById("tab-register");
  const loginForm   = document.getElementById("login-form");
  const regForm     = document.getElementById("register-form");

  function switchTab(show) {
    const isLogin = show === "login";
    tabLogin.classList.toggle("active", isLogin);
    tabRegister.classList.toggle("active", !isLogin);
    loginForm.style.display = isLogin ? "" : "none";
    regForm.style.display   = isLogin ? "none" : "";
    tabLogin.setAttribute("aria-selected", isLogin);
    tabRegister.setAttribute("aria-selected", !isLogin);
  }

  tabLogin.addEventListener("click",    () => switchTab("login"));
  tabRegister.addEventListener("click", () => switchTab("register"));

  // ─── Helpers ────────────────────────────────────────────
  function setLoading(btnId, textId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    const txt = document.getElementById(textId);
    btn.disabled    = loading;
    txt.textContent = loading ? "Please wait…" : defaultText;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add("visible");
  }

  function hideError(id) {
    document.getElementById(id).classList.remove("visible");
  }

  // ─── Login ──────────────────────────────────────────────
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError("login-error");
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    if (!email || !password) return showError("login-error", "Please fill all fields.");
    setLoading("login-btn", "login-btn-text", true, "Sign In");
    try {
      console.log("index.html: Attempting login for", email);
      await login(email, password);
      console.log("index.html: Login successful, waiting for auth state...");

      // Wait for auth state to be confirmed
      await new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          if (user) {
            console.log("index.html: Auth state confirmed, redirecting to domains.html");
            unsubscribe();
            resolve();
          }
        });
      });

      window.location.href = "domains.html";
    } catch (err) {
      console.error("index.html: Login failed", err);
      showError("login-error", friendlyError(err.code));
    } finally {
      setLoading("login-btn", "login-btn-text", false, "Sign In");
    }
  });

  // ─── Register ───────────────────────────────────────────
  regForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError("register-error");
    const name     = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    if (!name || !email || !password) return showError("register-error", "Please fill all fields.");
    if (password.length < 6) return showError("register-error", "Password must be at least 6 characters.");
    setLoading("register-btn", "register-btn-text", true, "Create Account");
    try {
      console.log("index.html: Attempting registration for", email);
      await register(name, email, password);
      console.log("index.html: Registration successful, waiting for auth state...");

      // Wait for auth state to be confirmed
      await new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          if (user) {
            console.log("index.html: Auth state confirmed, redirecting to domains.html");
            unsubscribe();
            resolve();
          }
        });
      });

      window.location.href = "domains.html";
    } catch (err) {
      console.error("index.html: Registration failed", err);
      showError("register-error", friendlyError(err.code));
    } finally {
      setLoading("register-btn", "register-btn-text", false, "Create Account");
    }
  });

  function friendlyError(code) {
    const map = {
      "auth/invalid-email":            "Invalid email address.",
      "auth/user-not-found":           "No account with that email.",
      "auth/wrong-password":           "Incorrect password.",
      "auth/email-already-in-use":     "Email already registered.",
      "auth/weak-password":            "Password is too weak.",
      "auth/network-request-failed":   "Network error. Check your connection.",
      "auth/invalid-credential":       "Invalid email or password.",
      "auth/too-many-requests":        "Too many attempts. Try again later.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }
</script>
</body>
</html>
